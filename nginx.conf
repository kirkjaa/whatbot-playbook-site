server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript text/html application/json;
    gzip_min_length 256;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(html|css|js|svg|png|jpg|jpeg|gif|webp|ico|woff2?)$ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    location ~* \.md$ {
        default_type text/plain;
        charset utf-8;
    }
}
